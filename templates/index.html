        height: 40px;
        animation: spin 1s linear infinite;
        margin:auto;

</div>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<div id="results"></div>

<script>

let currentData = [];

// 🔥 função chamada pelo form
function handleSearch(event) {
    event.preventDefault();
    search();
}

// 🎨 render dos resultados
function render(data) {

    const container = document.getElementById("results");

    container.style.display = "grid";
    container.style.gridTemplateColumns = "repeat(auto-fill, minmax(250px, 1fr))";
    container.style.gap = "15px";
    container.innerHTML = "";

    const selectedConsole = document.getElementById("consoleFilter").value;

    data.forEach(group => {

        if (selectedConsole && group.console !== selectedConsole) {
            return;
        }

        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.borderRadius = "10px";
        div.style.padding = "10px";
        div.style.background = "#f9f9f9";

        const best = group.offers[0];
        const bestPrice = best && best.price ? best.price : "N/A";

        const img = document.createElement("img");
        img.src = best?.image || "";
        img.style.width = "100%";
        img.style.height = "200px";
        img.style.objectFit = "cover";
        img.style.borderRadius = "8px";

        div.appendChild(img);

        const title = document.createElement("h3");
        title.innerHTML = `
            ${group.name} (${group.console}) 
            <span style="color:green;">${bestPrice}€</span>
        `;
        div.appendChild(title);

        group.offers.forEach((p, index) => {
            const item = document.createElement("p");

            item.innerHTML = `
                🏪 ${p.store} → ${p.price ?? "N/A"}€ 
                ${p.in_stock ? "✅" : "❌"}
                ${index === 0 ? "🔥" : ""}
            `;

            // 🔗 BOTÃO VER PRODUTO
            const link = document.createElement("a");
            link.href = p.url;
            link.target = "_blank"; // abre nova aba
            link.innerText = "Ver produto";
            link.style.display = "block";
            link.style.background = "#3498db";
            link.style.color = "white";
            link.style.padding = "5px 10px";
            link.style.borderRadius = "5px";
            link.style.textDecoration = "none";
            link.style.fontSize = "12px";

            item.appendChild(link);

            div.appendChild(item);
        });

        container.appendChild(div);
    });
}

// 🔍 função principal
async function search() {

    document.getElementById("loading").style.display = "block";
    document.getElementById("results").innerHTML = "";

    const query = document.getElementById("q").value.trim();

    if (!query) {
        document.getElementById("loading").style.display = "none";
        return;
    }

    try {
        const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        currentData = data;

        render(currentData);

    } catch (err) {
        console.error("Erro na pesquisa:", err);
    }

    document.getElementById("loading").style.display = "none";
}

// 🎛️ filtro por consola (apenas 1 vez!)
document.getElementById("consoleFilter").addEventListener("change", function() {
    render(currentData);
});

</script>

</body>
</html>
